version: '3.8'

services:
  # 1. Redis 服务
  redis:
    image: redis:7-alpine
    container_name: myagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # 2. 后端服务 (FastAPI)
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: myagent-backend
    # ports:
    #   - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./hf_cache:/root/.cache/huggingface
      - ./chroma_cache:/root/.cache/chroma
      # - C:/Users/Acho/.cache/chroma/onnx_models:/root/.cache/chroma/onnx_models
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # 3. 前端服务 (Streamlit)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend # 假设你为前端创建了独立的Dockerfile
    container_name: myagent-frontend
    # ports:
    #   - "8501:8501"
    command: >
      streamlit run app.py
      --server.enableXsrfProtection false
      --server.enableCORS false
      --server.headless true
    environment:
      # 为前端服务显式设置 BACKEND_URL 环境变量
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend
    restart: always

  # 4. Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: myagent-nginx
    ports:
      - "80:80" # 对外只暴露 80 端口
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  redis-data:

